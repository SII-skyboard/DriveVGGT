defaults:
  - default_dataset.yaml

exp_name: time_consist
img_size: 518
num_workers: 32
seed_value: 42
accum_steps: 1    # We did not use gradient accumulation in our training, while if you suffer from OOM, you can try to use it.
patch_size: 14
val_epoch_freq: 5
max_img_per_gpu: 30

limit_train_batches: 1000
# limit_val_batches: 400


data:
  # The code for data still looks too complicated. I should refactor this again (do I have time?...)
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: 32
    max_img_per_gpu: 30
    common_config:
      img_size: 518
      patch_size: 14
      debug: True
      repeat_batch: False # avoid oom
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        # - _target_: data.datasets.co3d.Co3dDataset
        #   split: train
        #   CO3D_DIR: /YOUR/PATH/TO/CO3D
        #   CO3D_ANNOTATION_DIR: /YOUR/PATH/TO/CO3D_ANNOTATION
        - _target_: data.datasets.nuscenes_mv.NuscenesDataset_MultiView
          split: train
          nusc_info: "/inspire/hdd/global_user/chenxinyan-240108120066/liuyanhao/data_nuscenes/nuscene_json"
          len_train: 850
          expand_ratio: 8 

  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: 32
    max_img_per_gpu: 30
    common_config:
      img_size: 518
      patch_size: 14
      debug: True
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        # - _target_: data.datasets.co3d.Co3dDataset
        #   split: test
        #   CO3D_DIR: /YOUR/PATH/TO/CO3D
        #   CO3D_ANNOTATION_DIR: /YOUR/PATH/TO/CO3D_ANNOTATION
        - _target_: data.datasets.nuscenes_mv.NuscenesDataset_MultiView
          split: train
          nusc_info: "/inspire/hdd/global_user/chenxinyan-240108120066/liuyanhao/data_nuscenes/nuscene_json"
          len_train: 850
          expand_ratio: 8 

logging:
  log_dir: logs
  log_visuals: False
  log_freq: 1
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth
        - loss_camera_consist
        - loss_T_consist
        - loss_R_consist
    val:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth

checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 5
  resume_checkpoint_path: /inspire/hdd/global_user/chenxinyan-240108120066/liuyanhao/vggt/ckpt/model.pt
  # resume_checkpoint_path: /inspire/hdd/global_user/chenxinyan-240108120066/liuyanhao/vggt/training/logs/exp001/ckpts/checkpoint_10.pt
  # resume_checkpoint_path: /inspire/hdd/global_user/chenxinyan-240108120066/liuyanhao/vggt/training/logs/exp001/ckpts/checkpoint_50.pt
  strict: False

loss:
  _target_: loss.MultitaskLoss
  camera: 
    time_consist: True
    weight_t_consist: 0.4
    weight: 1.0
    loss_type: "l1" # The paper uses smooth l1 loss, but we found l1 loss is more stable than smooth l1 and l2 loss.  
  depth:
    weight: 0.1
    gradient_loss_fn: "grad" 
    valid_range: 0.98
  # point: null
  # If you want to enable point, use the following config
  # point: 
  #   weight: 0.1
  #   gradient_loss_fn: "normal" 
  #   valid_range: 0.98
  track: null   

optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: 1e-5
    weight_decay: 0.05

  # frozen_module_names:
  #     - "*aggregator*"  # example, freeze the aggregator

  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 5.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      # - module_name: ["global_blocks"]
      #   max_norm: 1.0   # feel free to reduce this if you see instabilities
      #   norm_type: 2
      # - module_name: ["global_blocks"]
      #   max_norm: 1.0   # feel free to reduce this if you see instabilities
      #   norm_type: 2
      - module_name: ["depth"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["camera"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["point"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["position_encoder"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["frame_blocks"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["global_blocks"]
        max_norm: 1.0   # feel free to reduce this if you see instabilities
        norm_type: 2
      - module_name: ["multiview_atten"]
        max_norm: 5.0   # feel free to reduce this if you see instabilities
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: 5e-5
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 5e-5
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05

max_epochs: 100

model:
  _target_: vggt.models.vggt_low_resolution.VGGT_low_resolution
  enable_camera: True
  enable_depth: True
  enable_point: False
  enable_track: False
# model:
#   _target_: vggt.models.multiview_v2.MultiViewVGGT_v2
#   enable_camera: True
#   enable_depth: True
#   enable_point: False
#   enable_track: False

distributed:
  # check https://docs.pytorch.org/docs/stable/generated/torch.nn.parallel.DistributedDataParallel.html for options
  backend: nccl
  comms_dtype: None
  find_unused_parameters: False
  timeout_mins: 30
  gradient_as_bucket_view: True  # Less memory used
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
    cudnn_deterministic: False
    cudnn_benchmark: False
    allow_tf32: True